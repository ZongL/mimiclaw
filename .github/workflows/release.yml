name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    strategy:
      matrix:
        target:
          - name: esp32s3
            chip: esp32s3
            flash_mode: qio
            flash_size: 16MB
            flash_freq: 80m
            bootloader_offset: 0x0
            bin_offset: 0x20000
            partition_offset: 0x8000
            ota_offset: 0xf000
          - name: esp32cam
            chip: esp32
            flash_mode: qio
            flash_size: 4MB
            flash_freq: 40m
            bootloader_offset: 0x0
            bin_offset: 0x10000
            partition_offset: 0x9000
            ota_offset: 0xf000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware for ${{ matrix.target.name }}
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target ${{ matrix.target.chip }}

          # Use target-specific config if exists
          if [ -f "sdkconfig.defaults.${{ matrix.target.name }}" ]; then
            echo "Using sdkconfig.defaults.${{ matrix.target.name }}"
          fi

          idf.py build

      - name: Prepare release artifacts for ${{ matrix.target.name }}
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target.name }}"

          # Generate merged firmware for single-command flashing
          esptool.py --chip ${{ matrix.target.chip }} merge_bin \
            --flash_mode ${{ matrix.target.flash_mode }} \
            --flash_size ${{ matrix.target.flash_size }} \
            --flash_freq ${{ matrix.target.flash_freq }} \
            -o "mimiclaw-${TARGET}-full-${VERSION}.bin" \
            ${{ matrix.target.bootloader_offset }}     build/bootloader/bootloader.bin \
            ${{ matrix.target.partition_offset }}  build/partition_table/partition-table.bin \
            ${{ matrix.target.ota_offset }}  build/ota_data_initial.bin \
            ${{ matrix.target.bin_offset }} build/mimiclaw.bin

          # Copy individual binaries with version suffix
          cp build/mimiclaw.bin              "mimiclaw-${TARGET}-${VERSION}.bin"
          cp build/bootloader/bootloader.bin "bootloader-${TARGET}-${VERSION}.bin"
          cp build/partition_table/partition-table.bin "partition-table-${TARGET}-${VERSION}.bin"
          cp build/ota_data_initial.bin      "ota_data_initial-${TARGET}-${VERSION}.bin"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target.name }}
          path: |
            mimiclaw-${{ matrix.target.name }}-full-${{ github.ref_name }}.bin
            mimiclaw-${{ matrix.target.name }}-${{ github.ref_name }}.bin
            bootloader-${{ matrix.target.name }}-${{ github.ref_name }}.bin
            partition-table-${{ matrix.target.name }}-${{ github.ref_name }}.bin
            ota_data_initial-${{ matrix.target.name }}-${{ github.ref_name }}.bin
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Flashing Guide

            This release includes firmware for two targets:

            - **ESP32-S3** - Xiaozhi AI board (16MB flash, 8MB PSRAM)
            - **ESP32-CAM** - ESP32-CAM board (4MB flash, 4MB PSRAM)

            ---

            ## ESP32-S3 (Xiaozhi AI Board)

            ### Merged firmware (easiest)

            Download `mimiclaw-esp32s3-full-${{ github.ref_name }}.bin` and flash:

            ```bash
            esptool.py --chip esp32s3 -b 460800 write_flash 0x0 mimiclaw-esp32s3-full-${{ github.ref_name }}.bin
            ```

            ### Individual binaries (advanced)

            ```bash
            esptool.py --chip esp32s3 -b 460800 write_flash \
              0x0     bootloader-esp32s3-${{ github.ref_name }}.bin \
              0x8000  partition-table-esp32s3-${{ github.ref_name }}.bin \
              0xf000  ota_data_initial-esp32s3-${{ github.ref_name }}.bin \
              0x20000 mimiclaw-esp32s3-${{ github.ref_name }}.bin
            ```

            ---

            ## ESP32-CAM

            ### Merged firmware (easiest)

            Download `mimiclaw-esp32cam-full-${{ github.ref_name }}.bin` and flash:

            ```bash
            esptool.py --chip esp32 -b 460800 write_flash 0x0 mimiclaw-esp32cam-full-${{ github.ref_name }}.bin
            ```

            ### Individual binaries (advanced)

            ```bash
            esptool.py --chip esp32 -b 460800 write_flash \
              0x0     bootloader-esp32cam-${{ github.ref_name }}.bin \
              0x9000  partition-table-esp32cam-${{ github.ref_name }}.bin \
              0xf000  ota_data_initial-esp32cam-${{ github.ref_name }}.bin \
              0x10000 mimiclaw-esp32cam-${{ github.ref_name }}.bin
            ```

            ---

            ## OTA Update (for devices already running MimiClaw)

            Upload the firmware bin file via the OTA endpoint:
            - ESP32-S3: `mimiclaw-esp32s3-${{ github.ref_name }}.bin`
            - ESP32-CAM: `mimiclaw-esp32cam-${{ github.ref_name }}.bin`

            ## First-time setup

            After flashing, connect via serial (115200 baud) and configure:

            ```
            mimi> wifi <ssid> <password>
            mimi> set_tg_token <your-telegram-bot-token>
            mimi> set_api_key <your-anthropic-api-key>
            mimi> restart
            ```
          files: |
            # ESP32-S3 (Xiaozhi AI board)
            mimiclaw-esp32s3-full-${{ github.ref_name }}.bin
            mimiclaw-esp32s3-${{ github.ref_name }}.bin
            bootloader-esp32s3-${{ github.ref_name }}.bin
            partition-table-esp32s3-${{ github.ref_name }}.bin
            ota_data_initial-esp32s3-${{ github.ref_name }}.bin
            # ESP32-CAM
            mimiclaw-esp32cam-full-${{ github.ref_name }}.bin
            mimiclaw-esp32cam-${{ github.ref_name }}.bin
            bootloader-esp32cam-${{ github.ref_name }}.bin
            partition-table-esp32cam-${{ github.ref_name }}.bin
            ota_data_initial-esp32cam-${{ github.ref_name }}.bin
